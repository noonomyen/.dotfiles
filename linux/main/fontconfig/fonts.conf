<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- Fallback priority order for sans-serif -->
  <!-- This allows browsers to respect their settings, but falls back to Noto politely -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans Thai</family>
    </prefer>
  </alias>

  <!-- Fallback priority order for serif -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif Thai</family>
    </prefer>
  </alias>

  <!-- Fallback priority order for monospace -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono</family>
      <!-- Optional: Add a Thai monospace fallback if needed -->
      <family>Noto Sans Thai</family> 
    </prefer>
  </alias>

</fontconfig>
